<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Польская бабочка глаголов</title>
  <style>
    :root {
      --bg: #060606;
      --grid: rgba(255, 255, 255, 0.13);
      --ink: #ffffff;
      --muted: #b7b7b7;
      --paper: #ffffff;
      --paper-ink: #0b0b0b;
      --yellow: #fff200;
      --pink: #ff43dc;
      --blue: #70d9ff;
      --line: rgba(255, 255, 255, 0.92);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(var(--grid) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid) 2px, transparent 2px),
        var(--bg);
      background-size: 72px 72px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 38px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 390px);
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .search-box {
      display: grid;
      gap: 8px;
    }

    .search {
      width: 100%;
      min-height: 50px;
      border: 2px solid var(--paper);
      border-radius: 6px;
      padding: 0 14px;
      background: var(--paper);
      color: var(--paper-ink);
      outline: none;
      font-size: 18px;
    }

    .search:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(255, 242, 0, 0.25);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .butterfly {
      position: relative;
      min-height: 680px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(var(--grid) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid) 2px, transparent 2px),
        rgba(0, 0, 0, 0.45);
      background-size: 76px 76px;
    }

    .center-title {
      position: absolute;
      left: 50%;
      top: 28px;
      display: flex;
      gap: 70px;
      transform: translateX(-50%);
      z-index: 4;
      align-items: center;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      min-height: 58px;
      padding: 4px 10px;
      background: var(--paper);
      color: var(--paper-ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1;
      white-space: nowrap;
    }

    .word-chip.yellow {
      background: var(--yellow);
    }

    .body-line {
      position: absolute;
      left: 50%;
      top: 125px;
      width: 88px;
      height: 455px;
      transform: translateX(-50%);
      z-index: 1;
    }

    .body-line::before,
    .body-line::after {
      position: absolute;
      left: 50%;
      width: 34px;
      border: 7px solid var(--line);
      content: "";
      transform: translateX(-50%);
    }

    .body-line::before {
      top: 0;
      height: 218px;
      border-top: 0;
      border-radius: 0 0 28px 28px;
    }

    .body-line::after {
      bottom: 0;
      height: 220px;
      border-bottom: 0;
      border-radius: 28px 28px 0 0;
    }

    .wing {
      position: absolute;
      z-index: 2;
      display: grid;
      align-content: start;
      gap: 16px;
      padding: 52px 44px 36px;
      border: 8px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
    }

    .wing.ja {
      left: 35px;
      top: 105px;
      width: 43%;
      min-height: 335px;
      border-radius: 52% 22% 48% 24% / 42% 32% 46% 30%;
      transform: rotate(13deg);
    }

    .wing.mywy {
      right: 35px;
      top: 105px;
      width: 43%;
      min-height: 335px;
      border-radius: 22% 52% 24% 48% / 32% 42% 30% 46%;
      transform: rotate(-13deg);
    }

    .wing.ty {
      left: 120px;
      bottom: 58px;
      width: 35%;
      min-height: 270px;
      border-radius: 35% 26% 52% 44% / 28% 26% 55% 44%;
      transform: rotate(-11deg);
    }

    .wing.oni {
      right: 120px;
      bottom: 58px;
      width: 35%;
      min-height: 270px;
      border-radius: 26% 35% 44% 52% / 26% 28% 44% 55%;
      transform: rotate(11deg);
    }

    .wing > * {
      transform: rotate(var(--counter-rotate, 0deg));
    }

    .wing.ja > * {
      --counter-rotate: -13deg;
    }

    .wing.mywy > * {
      --counter-rotate: 13deg;
    }

    .wing.ty > * {
      --counter-rotate: 11deg;
    }

    .wing.oni > * {
      --counter-rotate: -11deg;
    }

    .label {
      color: var(--ink);
      font-family: "Comic Sans MS", "Trebuchet MS", cursive;
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1;
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.2);
    }

    .label small {
      color: var(--pink);
      font-size: 0.72em;
      margin-left: 8px;
    }

    .forms {
      display: grid;
      gap: 12px;
      width: max-content;
      max-width: 100%;
    }

    .form-chip {
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      padding: 5px 9px 6px;
      color: var(--paper-ink);
      background: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 3.8vw, 46px);
      line-height: 1.06;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .form-chip.main {
      background: var(--yellow);
    }

    .root {
      text-decoration: underline;
      text-decoration-color: var(--pink);
      text-decoration-thickness: 4px;
      text-underline-offset: 5px;
    }

    .suffix {
      text-decoration: underline;
      text-decoration-color: var(--blue);
      text-decoration-thickness: 4px;
      text-underline-offset: 5px;
    }

    .ending {
      color: var(--paper-ink);
    }

    .pick-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pick {
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 6px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      cursor: pointer;
    }

    .pick:hover,
    .pick.active {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--paper-ink);
    }

    @media (max-width: 860px) {
      .top {
        grid-template-columns: 1fr;
      }

      .butterfly {
        min-height: auto;
        padding: 18px;
      }

      .center-title,
      .body-line,
      .wing {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        width: 100%;
        min-height: 0;
        transform: none;
      }

      .center-title {
        transform: none;
        justify-content: center;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 14px;
      }

      .body-line {
        display: none;
      }

      .wing {
        margin-top: 12px;
        padding: 24px;
        border-width: 4px;
        border-radius: 8px;
      }

      .wing > * {
        transform: none;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>Бабочка польских глаголов</h1>
        <p class="hint">Введи русский глагол: если он есть в словаре, формы сразу разложатся по крыльям.</p>
      </div>
      <label class="search-box">
        <input class="search" id="verbSearch" type="text" placeholder="Например: гулять" autocomplete="off">
        <span class="status" id="status" aria-live="polite"></span>
      </label>
    </header>

    <section class="butterfly" aria-label="Бабочка спряжения">
      <div class="center-title">
        <span class="word-chip" id="russianVerb">гулять</span>
        <span class="word-chip yellow" id="polishVerb">spacerować</span>
      </div>

      <div class="body-line" aria-hidden="true"></div>

      <article class="wing ja">
        <div class="label">Ja <small>1 os.</small></div>
        <div class="forms" id="jaForms"></div>
      </article>

      <article class="wing mywy">
        <div class="label">My / Wy</div>
        <div class="forms" id="mywyForms"></div>
      </article>

      <article class="wing ty">
        <div class="label">Ty<br>On / Ona</div>
        <div class="forms" id="tyForms"></div>
      </article>

      <article class="wing oni">
        <div class="label">Oni / One <small>3 os.</small></div>
        <div class="forms" id="oniForms"></div>
      </article>
    </section>

    <div class="pick-list" id="pickList" aria-label="Глаголы из словаря"></div>
  </main>

  <script>
    const columns = ["ru", "infinitive", "ja", "oni", "ty", "onona", "my", "wy"];
    const starterVerbs = [
      ["быть", "być", "jestem", "są", "jesteś", "jest", "jesteśmy", "jesteście"],
      ["иметь", "mieć", "mam", "mają", "masz", "ma", "mamy", "macie"],
      ["делать", "robić", "robię", "robią", "robisz", "robi", "robimy", "robicie"],
      ["идти", "iść", "idę", "idą", "idziesz", "idzie", "idziemy", "idziecie"],
      ["ехать", "jechać", "jadę", "jadą", "jedziesz", "jedzie", "jedziemy", "jedziecie"],
      ["говорить", "mówić", "mówię", "mówią", "mówisz", "mówi", "mówimy", "mówicie"],
      ["видеть", "widzieć", "widzę", "widzą", "widzisz", "widzi", "widzimy", "widzicie"],
      ["есть", "jeść", "jem", "jedzą", "jesz", "je", "jemy", "jecie"],
      ["пить", "pić", "piję", "piją", "pijesz", "pije", "pijemy", "pijecie"],
      ["хотеть", "chcieć", "chcę", "chcą", "chcesz", "chce", "chcemy", "chcecie"],
      ["мочь", "móc", "mogę", "mogą", "możesz", "może", "możemy", "możecie"],
      ["работать", "pracować", "pracuję", "pracują", "pracujesz", "pracuje", "pracujemy", "pracujecie"],
      ["учиться", "uczyć się", "uczę się", "uczą się", "uczysz się", "uczy się", "uczymy się", "uczycie się"],
      ["жить", "mieszkać", "mieszkam", "mieszkają", "mieszkasz", "mieszka", "mieszkamy", "mieszkacie"],
      ["покупать", "kupować", "kupuję", "kupują", "kupujesz", "kupuje", "kupujemy", "kupujecie"],
      ["спать", "spać", "śpię", "śpią", "śpisz", "śpi", "śpimy", "śpicie"],
      ["понимать", "rozumieć", "rozumiem", "rozumieją", "rozumiesz", "rozumie", "rozumiemy", "rozumiecie"],
      ["знать", "wiedzieć", "wiem", "wiedzą", "wiesz", "wie", "wiemy", "wiecie"],
      ["думать", "myśleć", "myślę", "myślą", "myślisz", "myśli", "myślimy", "myślicie"],
      ["смотреть", "oglądać", "oglądam", "oglądają", "oglądasz", "ogląda", "oglądamy", "oglądacie"],
      ["слушать", "słuchać", "słucham", "słuchają", "słuchasz", "słucha", "słuchamy", "słuchacie"],
      ["читать", "czytać", "czytam", "czytają", "czytasz", "czyta", "czytamy", "czytacie"],
      ["писать", "pisać", "piszę", "piszą", "piszesz", "pisze", "piszemy", "piszecie"],
      ["открывать", "otwierać", "otwieram", "otwierają", "otwierasz", "otwiera", "otwieramy", "otwieracie"],
      ["закрывать", "zamykać", "zamykam", "zamykają", "zamykasz", "zamyka", "zamykamy", "zamykacie"],
      ["брать", "brać", "biorę", "biorą", "bierzesz", "bierze", "bierzemy", "bierzecie"],
      ["давать", "dawać", "daję", "dają", "dajesz", "daje", "dajemy", "dajecie"],
      ["помогать", "pomagać", "pomagam", "pomagają", "pomagasz", "pomaga", "pomagamy", "pomagacie"],
      ["искать", "szukać", "szukam", "szukają", "szukasz", "szuka", "szukamy", "szukacie"],
      ["находить", "znajdować", "znajduję", "znajdują", "znajdujesz", "znajduje", "znajdujemy", "znajdujecie"],
      ["гулять", "spacerować", "spaceruję", "spacerują", "spacerujesz", "spaceruje", "spacerujemy", "spacerujecie"],
      ["звонить", "dzwonić", "dzwonię", "dzwonią", "dzwonisz", "dzwoni", "dzwonimy", "dzwonicie"],
      ["ждать", "czekać", "czekam", "czekają", "czekasz", "czeka", "czekamy", "czekacie"],
      ["спрашивать", "pytać", "pytam", "pytają", "pytasz", "pyta", "pytamy", "pytacie"],
      ["отвечать", "odpowiadać", "odpowiadam", "odpowiadają", "odpowiadasz", "odpowiada", "odpowiadamy", "odpowiadacie"],
      ["готовить", "gotować", "gotuję", "gotują", "gotujesz", "gotuje", "gotujemy", "gotujecie"],
      ["убирать", "sprzątać", "sprzątam", "sprzątają", "sprzątasz", "sprząta", "sprzątamy", "sprzątacie"],
      ["стирать", "prać", "piorę", "piorą", "pierzesz", "pierze", "pierzemy", "pierzecie"],
      ["мыть", "myć", "myję", "myją", "myjesz", "myje", "myjemy", "myjecie"],
      ["платить", "płacić", "płacę", "płacą", "płacisz", "płaci", "płacimy", "płacicie"],
      ["заказывать", "zamawiać", "zamawiam", "zamawiają", "zamawiasz", "zamawia", "zamawiamy", "zamawiacie"],
      ["просить", "prosić", "proszę", "proszą", "prosisz", "prosi", "prosimy", "prosicie"],
      ["любить", "lubić", "lubię", "lubią", "lubisz", "lubi", "lubimy", "lubicie"],
      ["нравиться", "podobać się", "podobam się", "podobają się", "podobasz się", "podoba się", "podobamy się", "podobacie się"],
      ["возвращаться", "wracać", "wracam", "wracają", "wracasz", "wraca", "wracamy", "wracacie"],
      ["приходить", "przychodzić", "przychodzę", "przychodzą", "przychodzisz", "przychodzi", "przychodzimy", "przychodzicie"],
      ["выходить", "wychodzić", "wychodzę", "wychodzą", "wychodzisz", "wychodzi", "wychodzimy", "wychodzicie"],
      ["вставать", "wstawać", "wstaję", "wstają", "wstajesz", "wstaje", "wstajemy", "wstajecie"],
      ["ложиться", "kłaść się", "kładę się", "kładą się", "kładziesz się", "kładzie się", "kładziemy się", "kładziecie się"],
      ["забывать", "zapominać", "zapominam", "zapominają", "zapominasz", "zapomina", "zapominamy", "zapominacie"],
      ["помнить", "pamiętać", "pamiętam", "pamiętają", "pamiętasz", "pamięta", "pamiętamy", "pamiętacie"]
    ];

    const dictionary = new Map(starterVerbs.map((row) => [normalize(row[0]), rowToObject(row)]));
    const searchInput = document.querySelector("#verbSearch");
    const status = document.querySelector("#status");
    const pickList = document.querySelector("#pickList");

    function normalize(value) {
      return value.trim().toLowerCase().replace(/ё/g, "е");
    }

    function rowToObject(row) {
      return Object.fromEntries(columns.map((column, index) => [column, row[index] || ""]));
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function takeReflexive(form) {
      const reflexive = form.endsWith(" się") ? " się" : "";
      const clean = reflexive ? form.slice(0, -4) : form;
      return { clean, reflexive };
    }

    function splitByInfinitive(form, verb) {
      const { clean, reflexive } = takeReflexive(form);
      const infinitive = verb.infinitive.replace(" się", "");

      if (infinitive.endsWith("ować")) {
        const root = infinitive.slice(0, -"ować".length);
        const base = root + "uj";
        if (clean.startsWith(base)) {
          return { root, suffix: "uj", ending: clean.slice(base.length), reflexive };
        }
      }

      if (infinitive.endsWith("ać")) {
        const root = infinitive.slice(0, -"ać".length);
        if (clean.startsWith(root + "a")) {
          return { root, suffix: "a", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      if (infinitive.endsWith("ić")) {
        const root = infinitive.slice(0, -"ić".length);
        if (clean.startsWith(root + "i")) {
          return { root, suffix: "i", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      if (infinitive.endsWith("yć")) {
        const root = infinitive.slice(0, -"yć".length);
        if (clean.startsWith(root + "y")) {
          return { root, suffix: "y", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      return splitRootSuffixEnding(form);
    }

    function splitRootSuffixEnding(form) {
      const endings = ["ecie", "emy", "cie", "my", "esz", "asz", "isz", "ysz", "ją", "ę", "ą", "m", "sz", "e", "a", "i", "y"];
      const { clean, reflexive } = takeReflexive(form);
      const ending = endings.find((item) => clean.endsWith(item) && clean.length > item.length);

      if (!ending) {
        return { root: clean, suffix: "", ending: "", reflexive };
      }

      const base = clean.slice(0, -ending.length);
      const suffixes = ["uj"];
      const suffix = suffixes.find((item) => base.endsWith(item) && base.length > item.length) || "";
      const root = suffix ? base.slice(0, -suffix.length) : base;

      return {
        root,
        suffix,
        ending,
        reflexive
      };
    }

    function formChip(form, verb, main = false, mode = "root-ending") {
      const chip = document.createElement("div");
      chip.className = main ? "form-chip main" : "form-chip";

      const split = splitByInfinitive(form, verb);
      const suffix = split.suffix ? ` - <span class="suffix">${escapeHtml(split.suffix)}</span>` : "";
      const ending = split.ending ? ` - <span class="ending">${escapeHtml(split.ending)}</span>` : "";
      const suffixPart = mode === "root-suffix-ending" ? suffix : suffix.replace(" - ", "");
      chip.innerHTML = `<span class="root">${escapeHtml(split.root)}</span>${suffixPart}${ending}${escapeHtml(split.reflexive)}`;
      return chip;
    }

    function fillForms(containerId, forms, verb, mode = "root-ending") {
      const container = document.querySelector(containerId);
      container.innerHTML = "";
      forms.forEach((item, index) => {
        container.append(formChip(item, verb, index === 0, mode));
      });
    }

    function showVerb(verb) {
      document.querySelector("#russianVerb").textContent = verb.ru;
      document.querySelector("#polishVerb").textContent = verb.infinitive;
      fillForms("#jaForms", [verb.ja], verb);
      fillForms("#mywyForms", [verb.my, verb.wy], verb, "root-suffix-ending");
      fillForms("#tyForms", [verb.onona, verb.ty], verb);
      fillForms("#oniForms", [verb.oni], verb);
      status.textContent = `${verb.ru}: ${verb.infinitive}`;

      document.querySelectorAll(".pick").forEach((button) => {
        button.classList.toggle("active", normalize(button.textContent) === normalize(verb.ru));
      });
    }

    function trySearch() {
      const query = normalize(searchInput.value);
      if (!query) {
        status.textContent = "Напиши русский глагол или выбери его снизу.";
        return;
      }

      const found = dictionary.get(query);
      if (found) {
        showVerb(found);
        return;
      }

      status.textContent = "Этого глагола пока нет в словаре. Скажи мне слово, и я добавлю его формы.";
    }

    function buildPickList() {
      starterVerbs.forEach((row) => {
        const verb = rowToObject(row);
        const button = document.createElement("button");
        button.className = "pick";
        button.type = "button";
        button.textContent = verb.ru;
        button.addEventListener("click", () => {
          searchInput.value = verb.ru;
          showVerb(verb);
        });
        pickList.append(button);
      });
    }

    buildPickList();
    showVerb(dictionary.get("гулять"));
    searchInput.addEventListener("input", trySearch);
  </script>
</body>
</html>
