  <meta name="description" content="Визуальная обучалка польских глаголов: корень, суффикс и окончания по крыльям бабочки.">

  <style>
    :root {
      --bg: #060606;
      --grid: rgba(255, 255, 255, 0.13);
      --ink: #ffffff;
      --muted: #b7b7b7;
      --paper: #ffffff;
      --paper-ink: #0b0b0b;
      --yellow: #fff200;
      --pink: #ff43dc;
      --blue: #70d9ff;
      --line: rgba(255, 255, 255, 0.92);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
      color: var(--ink);
      font-family: Arial, Helvetica, sans-serif;
      background:
        linear-gradient(var(--grid) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid) 2px, transparent 2px),
        var(--bg);
      background-size: 72px 72px;
    }

    button,
    input {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 38px;
    }

    .top {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 390px);
      gap: 18px;
      align-items: end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(30px, 5vw, 58px);
      line-height: 1;
      letter-spacing: 0;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }

    .search-box {
      display: grid;
      gap: 8px;
    }

    .search {
      width: 100%;
      min-height: 50px;
      border: 2px solid var(--paper);
      border-radius: 6px;
      padding: 0 14px;
      background: var(--paper);
      color: var(--paper-ink);
      outline: none;
      font-size: 18px;
    }

    .search:focus {
      border-color: var(--yellow);
      box-shadow: 0 0 0 3px rgba(255, 242, 0, 0.25);
    }

    .status {
      min-height: 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .butterfly {
      position: relative;
      min-height: 680px;
      border: 1px solid rgba(255, 255, 255, 0.16);
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(var(--grid) 2px, transparent 2px),
        linear-gradient(90deg, var(--grid) 2px, transparent 2px),
        rgba(0, 0, 0, 0.45);
      background-size: 76px 76px;
    }

    .center-title {
      position: absolute;
      left: 50%;
      top: 28px;
      display: flex;
      gap: 70px;
      transform: translateX(-50%);
      z-index: 4;
      align-items: center;
    }

    .word-chip {
      display: inline-flex;
      align-items: center;
      min-height: 58px;
      border: 0;
      padding: 4px 10px;
      background: var(--paper);
      color: var(--paper-ink);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 4vw, 46px);
      line-height: 1;
      white-space: nowrap;
    }

    .word-chip.yellow {
      background: var(--yellow);
    }

    .speak-chip,
    .form-chip {
      cursor: pointer;
    }

    .speak-chip {
      gap: 8px;
    }

    .speak-chip::after {
      display: inline-block;
      width: 0;
      height: 0;
      border-top: 0.22em solid transparent;
      border-bottom: 0.22em solid transparent;
      border-left: 0.34em solid currentColor;
      content: "";
      opacity: 0.72;
    }

    .speak-chip:hover,
    .form-chip:hover {
      box-shadow: 0 0 0 3px rgba(112, 217, 255, 0.35);
    }

    .speak-chip:focus-visible,
    .form-chip:focus-visible {
      outline: 3px solid var(--blue);
      outline-offset: 3px;
    }

    .body-line {
      position: absolute;
      left: 50%;
      top: 125px;
      width: 88px;
      height: 455px;
      transform: translateX(-50%);
      z-index: 1;
    }

    .body-line::before,
    .body-line::after {
      position: absolute;
      left: 50%;
      width: 34px;
      border: 7px solid var(--line);
      content: "";
      transform: translateX(-50%);
    }

    .body-line::before {
      top: 0;
      height: 218px;
      border-top: 0;
      border-radius: 0 0 28px 28px;
    }

    .body-line::after {
      bottom: 0;
      height: 220px;
      border-bottom: 0;
      border-radius: 28px 28px 0 0;
    }

    .wing {
      position: absolute;
      z-index: 2;
      display: grid;
      align-content: start;
      gap: 16px;
      padding: 52px 44px 36px;
      border: 8px solid var(--line);
      background: rgba(0, 0, 0, 0.2);
    }

    .wing.ja {
      left: 35px;
      top: 105px;
      width: 43%;
      min-height: 335px;
      border-radius: 52% 22% 48% 24% / 42% 32% 46% 30%;
      transform: rotate(13deg);
    }

    .wing.mywy {
      right: 35px;
      top: 105px;
      width: 43%;
      min-height: 335px;
      border-radius: 22% 52% 24% 48% / 32% 42% 30% 46%;
      transform: rotate(-13deg);
    }

    .wing.ty {
      left: 120px;
      bottom: 58px;
      width: 35%;
      min-height: 270px;
      border-radius: 35% 26% 52% 44% / 28% 26% 55% 44%;
      transform: rotate(-11deg);
    }

    .wing.oni {
      right: 120px;
      bottom: 58px;
      width: 35%;
      min-height: 270px;
      border-radius: 26% 35% 44% 52% / 26% 28% 44% 55%;
      transform: rotate(11deg);
    }

    .wing > * {
      transform: rotate(var(--counter-rotate, 0deg));
    }

    .wing.ja > * {
      --counter-rotate: -13deg;
    }

    .wing.mywy > * {
      --counter-rotate: 13deg;
    }

    .wing.ty > * {
      --counter-rotate: 11deg;
    }

    .wing.oni > * {
      --counter-rotate: -11deg;
    }

    .label {
      color: var(--ink);
      font-family: "Comic Sans MS", "Trebuchet MS", cursive;
      font-size: clamp(28px, 3.2vw, 42px);
      line-height: 1;
      text-shadow: 0 0 2px rgba(255, 255, 255, 0.2);
    }

    .label small {
      color: var(--pink);
      font-size: 0.72em;
      margin-left: 8px;
    }

    .forms {
      display: grid;
      gap: 12px;
      width: max-content;
      max-width: 100%;
    }

    .form-chip {
      display: inline-block;
      width: fit-content;
      max-width: 100%;
      border: 0;
      padding: 5px 9px 6px;
      color: var(--paper-ink);
      background: var(--paper);
      font-family: Georgia, "Times New Roman", serif;
      font-size: clamp(30px, 3.8vw, 46px);
      line-height: 1.06;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .form-chip.main {
      background: var(--yellow);
    }

    .root {
      text-decoration: underline;
      text-decoration-color: var(--pink);
      text-decoration-thickness: 4px;
      text-underline-offset: 5px;
    }

    .suffix {
      text-decoration: underline;
      text-decoration-color: var(--blue);
      text-decoration-thickness: 4px;
      text-underline-offset: 5px;
    }

    .ending {
      color: var(--paper-ink);
    }

    .pick-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }

    .pick {
      min-height: 36px;
      border: 1px solid rgba(255, 255, 255, 0.55);
      border-radius: 6px;
      padding: 0 10px;
      background: rgba(255, 255, 255, 0.08);
      color: var(--ink);
      cursor: pointer;
    }

    .pick:hover,
    .pick.active {
      border-color: var(--yellow);
      background: var(--yellow);
      color: var(--paper-ink);
    }

    @media (max-width: 860px), (pointer: coarse) {
      body {
        background-size: 54px 54px;
      }

      .app {
        width: 100%;
        max-width: 640px;
        overflow: hidden;
        padding-right: 12px;
        padding-left: 12px;
        padding-top: max(82px, env(safe-area-inset-top));
        padding-bottom: 28px;
      }

      .top {
        grid-template-columns: 1fr;
        gap: 14px;
        margin-bottom: 14px;
        min-width: 0;
      }

      .top > * {
        min-width: 0;
      }

      h1 {
        max-width: 100%;
        font-size: 24px;
        line-height: 1.08;
        overflow-wrap: break-word;
      }

      .hint {
        max-width: 100%;
        font-size: 14px;
        overflow-wrap: break-word;
      }

      .search {
        min-height: 54px;
        font-size: 18px;
      }

      .butterfly {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        width: 100%;
        min-height: 0;
        padding: 14px;
        overflow: visible;
        border-radius: 8px;
        background-size: 54px 54px;
      }

      .center-title,
      .body-line,
      .wing {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        width: 100%;
        min-height: 0;
        height: auto;
        transform: none;
      }

      .center-title {
        display: grid;
        grid-template-columns: 1fr;
        justify-items: center;
        width: 100%;
        transform: none;
        gap: 10px;
        margin-bottom: 2px;
      }

      .body-line {
        display: none;
      }

      .wing {
        display: grid;
        min-width: 0;
        gap: 10px;
        margin: 0;
        padding: 14px;
        border-width: 3px;
        border-radius: 8px;
        background: rgba(0, 0, 0, 0.5);
      }

      .wing > * {
        transform: none;
      }

      .wing.ja,
      .wing.mywy,
      .wing.ty,
      .wing.oni {
        position: relative;
        left: auto;
        right: auto;
        top: auto;
        bottom: auto;
        width: 100%;
        min-height: 0;
        border-radius: 8px;
        transform: none;
      }

      .word-chip {
        max-width: 100%;
        min-height: 44px;
        font-size: clamp(28px, 9vw, 38px);
        white-space: normal;
        text-align: center;
      }

      .label {
        font-size: 27px;
      }

      .forms {
        min-width: 0;
        width: 100%;
      }

      .form-chip {
        display: block;
        width: 100%;
        min-width: 0;
        font-size: clamp(27px, 8vw, 34px);
        line-height: 1.08;
      }

      .pick-list {
        max-height: 160px;
        overflow: auto;
        padding-bottom: env(safe-area-inset-bottom);
      }

      .pick {
        min-height: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <header class="top">
      <div>
        <h1>Бабочка польских глаголов</h1>
        <p class="hint">Введи русский глагол — формы появятся ниже.</p>
      </div>
      <label class="search-box">
        <input class="search" id="verbSearch" type="text" placeholder="Например: гулять" autocomplete="off">
        <span class="status" id="status" aria-live="polite"></span>

    </header>

    <section class="butterfly" aria-label="Бабочка спряжения">
      <div class="center-title">
        <span class="word-chip" id="russianVerb">гулять</span>

      </div>

      <div class="body-line" aria-hidden="true"></div>

      <article class="wing ja">
        <div class="label">Ja <small>1 os.</small></div>
        <div class="forms" id="jaForms"></div>
      </article>

      <article class="wing mywy">
        <div class="label">My / Wy</div>
        <div class="forms" id="mywyForms"></div>
      </article>

      <article class="wing ty">

      </article>

      <article class="wing oni">
        <div class="label">Oni / One <small>3 os.</small></div>
        <div class="forms" id="oniForms"></div>
      </article>
    </section>

    <div class="pick-list" id="pickList" aria-label="Глаголы из словаря"></div>
  </main>

      ["развешивать белье", "wieszać pranie", "wieszam pranie", "wieszają pranie", "wieszasz pranie", "wiesza pranie", "wieszamy pranie", "wieszacie pranie"],
      ["вернуться поздно", "wrócić późno", "wrócę późno", "wrócą późno", "wrócisz późno", "wróci późno", "wrócimy późno", "wrócicie późno"],
      ["засыпать", "zasypiać", "zasypiam", "zasypiają", "zasypiasz", "zasypia", "zasypiamy", "zasypiacie"],
      ["разбирать покупки", "rozpakowywać zakupy", "rozpakowuję zakupy", "rozpakowują zakupy", "rozpakowujesz zakupy", "rozpakowuje zakupy", "rozpakowujemy zakupy", "rozpakowujecie zakupy"],
      ["ответить на сообщения", "odpowiedzieć na wiadomości", "odpowiem na wiadomości", "odpowiedzą na wiadomości", "odpowiesz na wiadomości", "odpowie na wiadomości", "odpowiemy na wiadomości", "odpowiecie na wiadomości"]
    ];

    const dictionary = new Map(starterVerbs.map((row) => [normalize(row[0]), rowToObject(row)]));
    dictionary.set("краситься", dictionary.get("краситься/делать макияж"));
    dictionary.set("делать макияж", dictionary.get("краситься/делать макияж"));
    const searchInput = document.querySelector("#verbSearch");
    const status = document.querySelector("#status");
    const pickList = document.querySelector("#pickList");
    const polishVerbButton = document.querySelector("#polishVerb");
    let polishVoice = null;

    function normalize(value) {
      return value.trim().toLowerCase().replace(/ё/g, "е");
    }

    function rowToObject(row) {
      return Object.fromEntries(columns.map((column, index) => [column, row[index] || ""]));
    }

    function escapeHtml(value) {
      return value
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function takeReflexive(form) {
      const reflexive = form.endsWith(" się") ? " się" : "";
      const clean = reflexive ? form.slice(0, -4) : form;
      return { clean, reflexive };
    }

    function splitByInfinitive(form, verb) {
      const { clean, reflexive } = takeReflexive(form);
      const infinitive = verb.infinitive.replace(" się", "");

      if (infinitive.endsWith("ować")) {
        const root = infinitive.slice(0, -"ować".length);
        const base = root + "uj";
        if (clean.startsWith(base)) {
          return { root, suffix: "uj", ending: clean.slice(base.length), reflexive };
        }
      }

      if (infinitive.endsWith("ać")) {
        const root = infinitive.slice(0, -"ać".length);
        if (clean.startsWith(root + "a")) {
          return { root, suffix: "a", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      if (infinitive.endsWith("ić")) {
        const root = infinitive.slice(0, -"ić".length);
        if (clean.startsWith(root + "i")) {
          return { root, suffix: "i", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      if (infinitive.endsWith("yć")) {
        const root = infinitive.slice(0, -"yć".length);
        if (clean.startsWith(root + "y")) {
          return { root, suffix: "y", ending: clean.slice(root.length + 1), reflexive };
        }
      }

      return splitRootSuffixEnding(form);
    }

    function splitRootSuffixEnding(form) {
      const endings = ["ecie", "emy", "cie", "my", "esz", "asz", "isz", "ysz", "ją", "ę", "ą", "m", "sz", "e", "a", "i", "y"];
      const { clean, reflexive } = takeReflexive(form);
      const ending = endings.find((item) => clean.endsWith(item) && clean.length > item.length);

      if (!ending) {
        return { root: clean, suffix: "", ending: "", reflexive };
      }

      const base = clean.slice(0, -ending.length);
      const suffixes = ["uj"];
      const suffix = suffixes.find((item) => base.endsWith(item) && base.length > item.length) || "";
      const root = suffix ? base.slice(0, -suffix.length) : base;

      return {
        root,
        suffix,
        ending,
        reflexive
      };
    }

    function formChip(form, verb, main = false, mode = "root-ending") {
      const chip = document.createElement("button");
      chip.className = main ? "form-chip main" : "form-chip";
      chip.type = "button";
      chip.setAttribute("aria-label", `Произнести ${form}`);

      const split = splitByInfinitive(form, verb);
      const suffix = split.suffix ? ` - <span class="suffix">${escapeHtml(split.suffix)}</span>` : "";
      const ending = split.ending ? ` - <span class="ending">${escapeHtml(split.ending)}</span>` : "";
      const suffixPart = mode === "root-suffix-ending" ? suffix : suffix.replace(" - ", "");
      chip.innerHTML = `<span class="root">${escapeHtml(split.root)}</span>${suffixPart}${ending}${escapeHtml(split.reflexive)}`;
      chip.addEventListener("click", () => speakPolish(form));
      return chip;
    }

    function fillForms(containerId, forms, verb, mode = "root-ending") {
      const container = document.querySelector(containerId);
      container.innerHTML = "";
      forms.forEach((item, index) => {
        container.append(formChip(item, verb, index === 0, mode));
      });
    }

    function showVerb(verb) {
      document.querySelector("#russianVerb").textContent = verb.ru;
      polishVerbButton.textContent = verb.infinitive;
      polishVerbButton.setAttribute("aria-label", `Произнести ${verb.infinitive}`);
      fillForms("#jaForms", [verb.ja], verb);
      fillForms("#mywyForms", [verb.my, verb.wy], verb, "root-suffix-ending");
      fillForms("#tyForms", [verb.onona, verb.ty], verb);
      fillForms("#oniForms", [verb.oni], verb);
      status.textContent = `${verb.ru}: ${verb.infinitive}. Нажми на польское слово, чтобы услышать произношение.`;

      document.querySelectorAll(".pick").forEach((button) => {
        button.classList.toggle("active", normalize(button.textContent) === normalize(verb.ru));
      });
    }

    function refreshPolishVoice() {
      if (!("speechSynthesis" in window)) {
        return;
      }

      const voices = window.speechSynthesis.getVoices();
      polishVoice = voices.find((voice) => voice.lang.toLowerCase().startsWith("pl")) || null;
    }

    function speakPolish(text) {
      if (!("speechSynthesis" in window)) {
        status.textContent = "В этом браузере нет встроенной озвучки.";
        return;
      }

      refreshPolishVoice();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = "pl-PL";
      utterance.rate = 0.86;
      utterance.pitch = 1;

      if (polishVoice) {
        utterance.voice = polishVoice;
      }

      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
      status.textContent = `Слушаем: ${text}`;
    }

    function trySearch() {
      const query = normalize(searchInput.value);
      if (!query) {
        status.textContent = "Напиши русский глагол или выбери его снизу.";
        return;
      }

      const found = dictionary.get(query);
      if (found) {
        showVerb(found);
        return;
      }

      status.textContent = "Этого глагола пока нет в словаре. Скажи мне слово, и я добавлю его формы.";
    }

    function buildPickList() {
      starterVerbs.forEach((row) => {
        const verb = rowToObject(row);
        const button = document.createElement("button");
        button.className = "pick";
        button.type = "button";
        button.textContent = verb.ru;
        button.addEventListener("click", () => {
          searchInput.value = verb.ru;
          showVerb(verb);
        });
        pickList.append(button);
      });
    }

    buildPickList();
    showVerb(dictionary.get("гулять"));
    searchInput.addEventListener("input", trySearch);
    polishVerbButton.addEventListener("click", () => speakPolish(polishVerbButton.textContent));

    if ("speechSynthesis" in window) {
      refreshPolishVoice();
      window.speechSynthesis.onvoiceschanged = refreshPolishVoice;
    }
  </script>
